<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1M-Checkboxes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(120deg, #232526 0%, #414345 100%);
            color: #fff;
            font-family: 'Montserrat', Arial, sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 3em;
            font-weight: 800;
            letter-spacing: 2px;
            color: #00ffe7;
            text-shadow: 0 0 12px #00ffe7, 0 2px 8px #111;
        }
        
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
            gap: 18px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px;
            background: rgba(30, 30, 40, 0.85);
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
            border: 1.5px solid rgba(0,255,231,0.15);
        }
        
        input[type="checkbox"] {
            width: 28px;
            height: 28px;
            cursor: pointer;
            accent-color: #00ffe7;
            background: #232526;
            border: 2px solid #00ffe7;
            border-radius: 8px;
            box-shadow: 0 0 8px #00ffe7, 0 0 2px #fff;
            transition: all 0.25s cubic-bezier(.4,2,.6,1);
        }
        
        input[type="checkbox"]:hover {
            transform: scale(1.18) rotate(-6deg);
            box-shadow: 0 0 18px #00ffe7, 0 0 8px #fff;
            border-color: #ff00cc;
            accent-color: #ff00cc;
        }
        
        input[type="checkbox"]:checked {
            background: #ff00cc;
            border-color: #ff00cc;
            box-shadow: 0 0 18px #ff00cc, 0 0 8px #fff;
            accent-color: #ff00cc;
            animation: pop 0.25s cubic-bezier(.4,2,.6,1);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            60% { transform: scale(1.3) rotate(8deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>
    <h1>1M Checkboxes</h1>
    <div class="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const container = document.querySelector('.container');
        const totalCheckboxes = 100; 
        
        socket.on('server:checkbox:change', (data) => {
            console.log(data);
            const { index, checked } = data;    

            const checkbox = document.getElementById(`checkbox-${index}`);
            if (checkbox) {
                checkbox.checked = checked;
            }
        });
        

        window.addEventListener('load', async() => {
            const response = await fetch('/checkboxes', { method: 'GET'});
            const data = await response.json();

            if(data && data.checkboxes) {
                data.checkboxes.forEach((serverValue, index) => {
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = `checkbox-${index}`;
                    checkbox.checked = serverValue;
                    checkbox.addEventListener('change', () => {
                        const checked = event.target.checked;
                        // console.log('checkboxState', { index, checked });
                        socket.emit('client:checkbox:change', { index, checked });
                    });
                    container.appendChild(checkbox);
                });
            }
        });
    </script>
</body>
</html>
